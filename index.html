<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign In</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="card">

  <!-- ================= LOADING (shown while Firebase restores session) ================= -->
  <section id="screen-loading" class="screen active">
    <div class="spinner"></div>
    <p class="muted">Checking session…</p>
  </section>

  <!-- ================= METHOD SELECTOR ================= -->
  <section id="screen-method" class="screen">
    <h1>Sign in</h1>
    <p class="subtitle">Choose how you'd like to continue</p>

    <button id="googleBtn" class="btn btn-outline">
      <svg width="18" height="18" viewBox="0 0 18 18">
        <path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84c-.21 1.13-.84 2.08-1.79 2.72v2.26h2.9c1.7-1.57 2.69-3.88 2.69-6.62z"/>
        <path fill="#34A853" d="M9 18c2.43 0 4.47-.81 5.96-2.18l-2.9-2.26c-.81.54-1.84.86-3.06.86-2.35 0-4.34-1.59-5.05-3.72H.96v2.33C2.44 15.98 5.48 18 9 18z"/>
        <path fill="#FBBC05" d="M3.95 10.7c-.18-.54-.28-1.11-.28-1.7s.1-1.16.28-1.7V4.97H.96A8.997 8.997 0 0 0 0 9c0 1.45.35 2.83.96 4.03l2.99-2.33z"/>
        <path fill="#EA4335" d="M9 3.58c1.32 0 2.51.45 3.44 1.35l2.58-2.58C13.46.89 11.43 0 9 0 5.48 0 2.44 2.02.96 4.97l2.99 2.33C4.66 5.17 6.65 3.58 9 3.58z"/>
      </svg>
      Continue with Google
    </button>

    <button id="showPhoneBtn" class="btn btn-outline">
      <span class="icon">📱</span> Continue with Phone Number
    </button>

    <button id="showEmailBtn" class="btn btn-outline">
      <span class="icon">✉️</span> Continue with Email
    </button>

    <p class="status" id="status-method"></p>
  </section>

  <!-- ================= PHONE: ENTER NUMBER ================= -->
  <section id="screen-phone-entry" class="screen">
    <button class="back-btn" data-back="screen-method">← Back</button>
    <h1>Enter phone number</h1>
    <p class="subtitle">We'll text you a verification code</p>

    <div class="field-row">
      <input id="countryCode" class="country-code" type="text" value="+91" />
      <input id="phoneNumber" type="tel" placeholder="Phone number" inputmode="numeric" />
    </div>

    <button id="sendOtpBtn" class="btn btn-primary">
      <span class="btn-label">Send OTP</span>
      <span class="btn-spinner hidden"></span>
    </button>

    <!-- reCAPTCHA mounts here once and is never re-created -->
    <div id="recaptcha-container"></div>

    <p class="status" id="status-phone-entry"></p>
  </section>

  <!-- ================= PHONE: VERIFY OTP ================= -->
  <section id="screen-phone-otp" class="screen">
    <button class="back-btn" data-back="screen-phone-entry">← Use a different number</button>
    <h1>Enter the code</h1>
    <p class="subtitle">Sent to <strong id="sentToNumber"></strong></p>

    <div class="field-row">
      <input id="otpCode" type="text" placeholder="6-digit code" inputmode="numeric" maxlength="6" />
    </div>

    <button id="verifyOtpBtn" class="btn btn-primary">
      <span class="btn-label">Verify Code</span>
      <span class="btn-spinner hidden"></span>
    </button>

    <p class="status" id="status-phone-otp"></p>
  </section>

  <!-- ================= EMAIL: SIGN IN / SIGN UP ================= -->
  <section id="screen-email" class="screen">
    <button class="back-btn" data-back="screen-method">← Back</button>
    <h1>Continue with email</h1>

    <div class="tabs">
      <button id="tabSignIn" class="tab active">Sign In</button>
      <button id="tabSignUp" class="tab">Sign Up</button>
    </div>

    <form id="emailForm" novalidate>
      <div class="field-row">
        <input id="emailInput" type="email" placeholder="Email address" autocomplete="email" />
      </div>
      <div class="field-row">
        <input id="passwordInput" type="password" placeholder="Password" autocomplete="current-password" />
      </div>
      <div class="field-row hidden" id="confirmPasswordRow">
        <input id="confirmPasswordInput" type="password" placeholder="Confirm password" autocomplete="new-password" />
      </div>

      <button id="emailSubmitBtn" type="submit" class="btn btn-primary">
        <span class="btn-label">Sign In</span>
        <span class="btn-spinner hidden"></span>
      </button>
    </form>

    <button id="forgotPasswordLink" class="link-btn">Forgot password?</button>

    <p class="status" id="status-email"></p>
  </section>

  <!-- ================= EMAIL: FORGOT PASSWORD ================= -->
  <section id="screen-forgot" class="screen">
    <button class="back-btn" data-back="screen-email">← Back to sign in</button>
    <h1>Reset password</h1>
    <p class="subtitle">Enter your email and we'll send you a reset link</p>

    <div class="field-row">
      <input id="resetEmailInput" type="email" placeholder="Email address" autocomplete="email" />
    </div>

    <button id="sendResetBtn" class="btn btn-primary">
      <span class="btn-label">Send Reset Link</span>
      <span class="btn-spinner hidden"></span>
    </button>

    <p class="status" id="status-forgot"></p>
  </section>

  <!-- ================= PROFILE (logged in) ================= -->
  <section id="screen-profile" class="screen">
    <img id="avatar" class="avatar hidden" src="" alt="" />
    <div id="avatarFallback" class="avatar avatar-fallback hidden"></div>

    <p class="name" id="profileName"></p>
    <p class="email" id="profileEmail"></p>

    <div id="verifyBanner" class="banner hidden">
      Your email isn't verified yet.
      <button id="resendVerificationBtn" class="link-btn">Resend verification email</button>
    </div>

    <button id="logoutBtn" class="btn btn-danger">Sign out</button>

    <p class="status" id="status-profile"></p>
  </section>

</div>

<script type="module" src="app.js"></script>
</body>
</html>
